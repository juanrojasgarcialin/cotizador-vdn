services:
  - type: web
    name: cotizador-vdn-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cotizador-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # Lo configuras manualmente con la URL de Vercel

databases:
  - name: cotizador-db
    plan: free
    region: oregon
